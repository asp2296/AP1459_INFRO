name: Repro IaC Finding
on: [push, workflow_dispatch]

jobs:
  simulate-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate the Ghost File
        run: |
          # This mimics the customer's "missing" file by copying the module 
          # to the specific path reported in their finding.
          cp AP1002_IBMMQ/Bicep/Modules/vm_module.bicep AP1002_IBMMQ/Bicep/Modules/2efe14c5-5b0a-405d-a447-b14b257a8a79-input.bicep
          
      - name: Run IaC Scanner (Checkov)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: bicep
          soft_fail: true # This allows the job to finish even if it finds errors
